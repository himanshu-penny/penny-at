name: Penny AT CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekday smoke check at 08:00 UTC.
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
    inputs:
      client:
        description: "Penny client"
        required: false
        default: "ewcf"
        type: choice
        options: [ewcf, rcmc, srmg, voltalia, enterprise, sabil]
      test_env:
        description: "Target environment, for example test, fb, or fb-5"
        required: false
        default: "test"
        type: string
      test_grep:
        description: "Optional Playwright grep filter, for example @smoke or @regression"
        required: false
        default: ""

env:
  CLIENT: ${{ github.event.inputs.client || 'ewcf' }}
  TEST_ENV: ${{ github.event.inputs.test_env || 'test' }}
  TEST_GREP: ${{ github.event_name == 'schedule' && '@smoke' || github.event.inputs.test_grep || '' }}
  WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
  API_BASE_URL: ${{ secrets.API_BASE_URL }}
  USER_EMAIL: ${{ secrets.USER_EMAIL }}
  USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

jobs:
  quality:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  test:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        project: [api-testing, smoke]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for web tests
        if: matrix.project == 'smoke'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        shell: bash
        run: |
          args=(--project="${{ matrix.project }}")
          if [ -n "$TEST_GREP" ]; then
            args+=(--grep "$TEST_GREP")
          fi
          npx playwright test "${args[@]}"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.project }}
          path: |
            artifacts/reports/
            artifacts/test-results/
          retention-days: 14

      - name: Publish JUnit summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Playwright — ${{ matrix.project }}"
          path: "artifacts/reports/junit.xml"
          reporter: java-junit
